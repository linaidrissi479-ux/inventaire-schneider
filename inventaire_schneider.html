<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Schneider Electric - Smart Inventory PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root { --green-se: #009639; --bg-gray: #f4f5f7; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-gray); margin: 0; display: flex; height: 100vh; }
        
        .sidebar { width: 300px; background: white; border-right: 1px solid #ddd; padding: 25px; display: flex; flex-direction: column; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }

        /* --- NOUVEAU DASHBOARD --- */
        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-top: 5px solid #ccc; }
        .stat-card h3 { margin: 0; font-size: 11px; text-transform: uppercase; color: #666; }
        .stat-card .value { font-size: 24px; font-weight: bold; margin-top: 5px; }
        .card-total { border-color: #007bff; }
        .card-ok { border-color: var(--green-se); }
        .card-manquant { border-color: #d9534f; }
        .card-surplus { border-color: #f0ad4e; }

        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .status-box { padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; font-weight: bold; text-align: center; }
        .status-off { background: #f8d7da; color: #721c24; }
        .status-on { background: #e6f7ec; color: var(--green-se); border: 1px solid var(--green-se); }
        
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; outline: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #eee; font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .btn-pdf { background: var(--green-se); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: auto; }
        .badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .badge-neg { background: #f8d7da; color: #d9534f; }
        .badge-pos { background: #fff3cd; color: #856404; }
        .badge-ok { background: #d4edda; color: var(--green-se); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color: var(--green-se);">🟢 Schneider</h2>
        <div class="card" style="padding: 15px; border: 1px dashed var(--green-se);">
            <div style="font-size: 11px; font-weight: bold; margin-bottom: 5px;">1. IMPORTER L'EXTRACTION SAP</div>
            <input type="file" id="csv-file" accept=".csv" onclick="this.value=null;">
        </div>
        <div id="db-status" class="status-box status-off">❌ EN ATTENTE DU FICHIER</div>
        <button class="btn-pdf" onclick="exportPDF()">📄 GÉNÉRER LE RAPPORT PDF</button>
    </div>

    <div class="main-content">
        <header>
            <h1>Inventaire Digitalisé</h1>
            <p id="date-label" style="color: #666;"></p>
        </header>

        <div class="dashboard">
            <div class="stat-card card-total">
                <h3>Total SAP</h3>
                <div id="stat-sap" class="value">0</div>
            </div>
            <div class="stat-card card-ok">
                <h3>Conformes</h3>
                <div id="stat-ok" class="value">0</div>
            </div>
            <div class="stat-card card-manquant">
                <h3>Manquants</h3>
                <div id="stat-manquant" class="value">0</div>
            </div>
            <div class="stat-card card-surplus">
                <h3>Surplus</h3>
                <div id="stat-surplus" class="value">0</div>
            </div>
        </div>

        <div class="card">
            <div style="font-size: 11px; font-weight: bold; margin-bottom: 10px;">2. SCANNER LES PRODUITS SUR LE TERRAIN</div>
            <input type="text" id="barcode-input" placeholder="Attente du fichier SAP..." disabled>
            <div id="scan-feedback" style="margin-top: 10px; font-weight: bold;"></div>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Référence</th>
                        <th>Désignation</th>
                        <th>SAP (Théo)</th>
                        <th>Terrain (Réel)</th>
                        <th>Écart</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        let dbStock = {}; 
        let reelCount = {}; 

        // FONCTION DE REMISE À ZÉRO
        function resetSystem() {
            dbStock = {};
            reelCount = {};
            document.getElementById('table-body').innerHTML = "";
            document.getElementById('stat-sap').innerText = "0";
            document.getElementById('stat-ok').innerText = "0";
            document.getElementById('stat-manquant').innerText = "0";
            document.getElementById('stat-surplus').innerText = "0";
            document.getElementById('scan-feedback').innerText = "";
        }

        document.getElementById('csv-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            resetSystem(); // On vide tout dès qu'un nouveau fichier arrive

            Papa.parse(file, {
                header: true,
                delimiter: ";",
                skipEmptyLines: true,
                complete: function(results) {
                    results.data.forEach(row => {
                        if (row.Reference) {
                            dbStock[row.Reference.trim().toUpperCase()] = {
                                designation: row.Designation || "Inconnu",
                                theo: parseInt(row.StockTheorique) || 0
                            };
                        }
                    });
                    document.getElementById('db-status').innerText = "✅ BASE SAP CHARGÉE";
                    document.getElementById('db-status').className = "status-box status-on";
                    document.getElementById('barcode-input').disabled = false;
                    document.getElementById('barcode-input').placeholder = "Prêt à scanner...";
                    document.getElementById('stat-sap').innerText = Object.keys(dbStock).length;
                    document.getElementById('barcode-input').focus();
                }
            });
        });

        const input = document.getElementById('barcode-input');
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const code = input.value.trim().toUpperCase();
                if (dbStock[code]) {
                    reelCount[code] = (reelCount[code] || 0) + 1;
                    updateUI();
                }
                input.value = "";
            }
        });

        function updateUI() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = "";
            
            let ok = 0, manquant = 0, surplus = 0;

            for (let ref in reelCount) {
                const data = dbStock[ref];
                const reel = reelCount[ref];
                const ecart = reel - data.theo;
                
                let badge = "badge-ok";
                if (ecart < 0) { badge = "badge-neg"; manquant++; }
                else if (ecart > 0) { badge = "badge-pos"; surplus++; }
                else { ok++; }

                tbody.innerHTML += `<tr><td><b>${ref}</b></td><td>${data.designation}</td><td>${data.theo}</td><td><b>${reel}</b></td><td><span class="badge ${badge}">${ecart}</span></td></tr>`;
            }
            
            document.getElementById('stat-ok').innerText = ok;
            document.getElementById('stat-manquant').innerText = manquant;
            document.getElementById('stat-surplus').innerText = surplus;
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const dateHeure = new Date().toLocaleDateString() + " à " + new Date().toLocaleTimeString();

            doc.setFontSize(18);
            doc.setTextColor(0, 150, 57);
            doc.text("Rapport d'Inventaire Schneider", 14, 20);
            
            doc.setFontSize(11);
            doc.setTextColor(100);
            doc.text("Établi le : " + dateHeure, 14, 28);

            const tableData = Object.keys(reelCount).map(ref => [
                ref, dbStock[ref].designation, dbStock[ref].theo, reelCount[ref], reelCount[ref] - dbStock[ref].theo
            ]);

            doc.autoTable({ 
                head: [['Référence', 'Désignation', 'SAP', 'Réel', 'Écart']], 
                body: tableData, 
                startY: 35, 
                headStyles: { fillColor: [0, 150, 57] } 
            });
            
            doc.save("Inventaire_Schneider.pdf");
        }
        
        document.getElementById('date-label').innerText = "Session du " + new Date().toLocaleDateString();
    </script>
</body>
</html>
