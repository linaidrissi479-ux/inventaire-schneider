<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Schneider Electric - Smart Inventory PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root { --green-se: #009639; --bg-gray: #f4f5f7; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-gray); margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 300px; background: white; border-right: 1px solid #ddd; padding: 25px; display: flex; flex-direction: column; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .status-box { padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; font-weight: bold; text-align: center; }
        .status-off { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .status-on { background: #e6f7ec; color: var(--green-se); border: 1px solid var(--green-se); }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .instruction { font-size: 12px; color: #666; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; }
        input[type="file"] { margin-bottom: 10px; width: 100%; }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; outline: none; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #eee; font-size: 12px; color: #555; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .btn-pdf { background: var(--green-se); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: auto; }
        .badge-neg { color: #d9534f; font-weight: bold; }
        .badge-pos { color: var(--green-se); font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color: var(--green-se); margin-bottom: 30px;">🟢 Schneider</h2>
        <div class="card" style="padding: 15px; border: 1px dashed var(--green-se); margin-bottom: 15px;">
            <div class="instruction">1. Importer l'extraction SAP</div>
            <input type="file" id="csv-file" accept=".csv" onclick="this.value=null;">
            <p style="font-size: 10px; color: #888; margin-top: 10px;">En chargeant un fichier, l'inventaire précédent est effacé.</p>
        </div>
        <div id="db-status" class="status-box status-off">❌ EN ATTENTE DU FICHIER</div>
        <button class="btn-pdf" onclick="exportPDF()">📄 GÉNÉRER LE RAPPORT PDF</button>
    </div>

    <div class="main-content">
        <header style="margin-bottom: 30px;">
            <h1 id="titre-entete">Inventaire Digitalisé</h1>
            <p id="date-label" style="color: #666;"></p>
        </header>
        <div class="card">
            <div class="instruction">2. Scanner les produits sur le terrain</div>
            <input type="text" id="barcode-input" placeholder="Veuillez d'abord charger le fichier SAP..." disabled>
            <div id="scan-feedback" style="margin-top: 15px; font-weight: bold; min-height: 20px;"></div>
        </div>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Référence</th>
                        <th>Désignation</th>
                        <th>SAP (Théo)</th>
                        <th>Terrain (Réel)</th>
                        <th>Écart</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        let dbStock = {}; 
        let reelCount = {}; 

        document.getElementById('csv-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // FORCER LE RESET COMPLET DES VARIABLES
            dbStock = {}; 
            reelCount = {}; 
            document.getElementById('table-body').innerHTML = ""; 
            document.getElementById('scan-feedback').innerText = "Nouvelle base SAP chargée. Inventaire réinitialisé.";
            document.getElementById('scan-feedback').style.color = "blue";

            Papa.parse(file, {
                header: true,
                delimiter: ";",
                skipEmptyLines: true,
                complete: function(results) {
                    results.data.forEach(row => {
                        if (row.Reference) {
                            dbStock[row.Reference.trim().toUpperCase()] = {
                                designation: row.Designation || "Inconnu",
                                theo: parseInt(row.StockTheorique) || 0
                            };
                        }
                    });
                    const status = document.getElementById('db-status');
                    status.innerText = "✅ BASE SAP CHARGÉE";
                    status.className = "status-box status-on";
                    const input = document.getElementById('barcode-input');
                    input.disabled = false;
                    input.placeholder = "Prêt à scanner...";
                    input.focus();
                }
            });
        });

        const input = document.getElementById('barcode-input');
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const code = input.value.trim().toUpperCase();
                if (dbStock[code]) {
                    reelCount[code] = (reelCount[code] || 0) + 1;
                    updateTable();
                    document.getElementById('scan-feedback').innerText = "✅ " + dbStock[code].designation;
                    document.getElementById('scan-feedback').style.color = "#009639";
                }
                input.value = "";
            }
        });

        function updateTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = "";
            for (let ref in reelCount) {
                const data = dbStock[ref];
                const reel = reelCount[ref];
                const ecart = reel - data.theo;
                tbody.innerHTML += `<tr><td><b>${ref}</b></td><td>${data.designation}</td><td>${data.theo}</td><td><b>${reel}</b></td><td class="${ecart < 0 ? 'badge-neg' : (ecart > 0 ? 'badge-pos' : '')}">${ecart}</td></tr>`;
            }
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18);
            doc.setTextColor(0, 150, 57);
            doc.text("État des Écarts de Stock", 14, 20);
            const tableData = Object.keys(reelCount).map(ref => [ref, dbStock[ref].designation, dbStock[ref].theo, reelCount[ref], reelCount[ref] - dbStock[ref].theo]);
            doc.autoTable({ head: [['Référence', 'Désignation', 'SAP', 'Réel', 'Écart']], body: tableData, startY: 30, headStyles: { fillColor: [0, 150, 57] } });
            doc.save("Etat_Ecarts_Stock.pdf");
        }
        document.getElementById('date-label').innerText = "Session du " + new Date().toLocaleDateString();
    </script>
</body>
</html>
