<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Schneider Electric - Smart Inventory PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root { --green-se: #009639; --bg-gray: #f4f5f7; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-gray); margin: 0; display: flex; height: 100vh; }
        
        .sidebar { width: 260px; background: white; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        
        .status-box { padding: 10px; border-radius: 5px; margin-bottom: 20px; font-size: 13px; font-weight: bold; }
        .status-ok { background: #e6f7ec; color: var(--green-se); border: 1px solid var(--green-se); }
        .status-loading { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }

        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; outline: none; transition: 0.3s; box-sizing: border-box; }
        input[type="text"]:focus { border-color: var(--green-se); }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th { background: #f8f9fa; padding: 15px; text-align: left; color: #666; font-size: 12px; text-transform: uppercase; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .btn-pdf { background: var(--green-se); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: auto; }
        .btn-pdf:hover { background: #007d30; }
        
        .badge-neg { color: #d9534f; font-weight: bold; }
        .badge-pos { color: var(--green-se); font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color: var(--green-se); margin-top: 0;">🟢 Schneider</h2>
        <div id="db-status" class="status-box status-loading">⏳ Connexion au fichier CSV...</div>
        <p style="font-size: 12px; color: #888;">Connecté au stock SAP (data.csv)</p>
        <button class="btn-pdf" onclick="exportPDF()">📄 GÉNÉRER RAPPORT PDF</button>
    </div>

    <div class="main-content">
        <header style="margin-bottom: 30px;">
            <h1 id="titre-mois">Inventaire Digitalisé</h1>
            <p style="color: #666;">Scannez les articles pour vérifier les écarts de stock.</p>
        </header>

        <div class="card">
            <label style="display: block; margin-bottom: 10px; font-weight: bold; color: #444;">SCANNEZ ICI :</label>
            <input type="text" id="barcode-input" placeholder="Bipez une référence (ex: LC1D12BL)..." autofocus>
            <div id="scan-feedback" style="margin-top: 10px; font-weight: bold;"></div>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Référence</th>
                        <th>Désignation</th>
                        <th>SAP (Théorique)</th>
                        <th>Réel (Douchette)</th>
                        <th>Écart</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let dbStock = {}; // Contiendra les données du CSV
        let reelCount = {}; // Contiendra vos scans

        // 1. CHARGEMENT AUTOMATIQUE DU CSV (data.csv)
        Papa.parse("data.csv", {
            download: true,
            header: true,
            delimiter: ";", // Important pour Excel français
            complete: function(results) {
                console.log("Données chargées:", results.data);
                results.data.forEach(row => {
                    if (row.Reference) {
                        dbStock[row.Reference.trim().toUpperCase()] = {
                            designation: row.Designation,
                            theo: parseInt(row.StockTheorique) || 0
                        };
                    }
                });
                const status = document.getElementById('db-status');
                status.innerText = "✅ STOCK SAP CONNECTÉ";
                status.className = "status-box status-ok";
            },
            error: function() {
                const status = document.getElementById('db-status');
                status.innerText = "❌ ERREUR : data.csv non trouvé";
                status.style.background = "#f8d7da";
                status.style.color = "#721c24";
            }
        });

        // 2. GESTION DU SCAN
        const input = document.getElementById('barcode-input');
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const code = input.value.trim().toUpperCase();
                const feedback = document.getElementById('scan-feedback');
                
                if (dbStock[code]) {
                    reelCount[code] = (reelCount[code] || 0) + 1;
                    feedback.innerText = "✅ " + dbStock[code].designation + " ajouté !";
                    feedback.style.color = "#009639";
                    updateTable();
                } else {
                    feedback.innerText = "⚠️ Référence inconnue dans le fichier SAP";
                    feedback.style.color = "#d9534f";
                }
                input.value = ""; // Vide le champ pour le prochain scan
            }
        });

        // 3. MISE À JOUR DU TABLEAU
        function updateTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = "";
            
            for (let ref in reelCount) {
                const data = dbStock[ref];
                const reel = reelCount[ref];
                const ecart = reel - data.theo;
                
                const row = `<tr>
                    <td><b>${ref}</b></td>
                    <td>${data.designation}</td>
                    <td>${data.theo}</td>
                    <td><b>${reel}</b></td>
                    <td class="${ecart < 0 ? 'badge-neg' : 'badge-pos'}">${ecart}</td>
                </tr>`;
                tbody.innerHTML += row;
            }
        }

        // 4. EXPORT PDF
        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18);
            doc.text("Rapport d'Inventaire Schneider Electric", 14, 20);
            
            const tableData = [];
            for (let ref in reelCount) {
                tableData.push([
                    ref, 
                    dbStock[ref].designation, 
                    dbStock[ref].theo, 
                    reelCount[ref], 
                    reelCount[ref] - dbStock[ref].theo
                ]);
            }

            doc.autoTable({
                head: [['Référence', 'Désignation', 'SAP', 'Réel', 'Écart']],
                body: tableData,
                startY: 30,
                headStyles: { fillColor: [0, 150, 57] }
            });

            doc.save("Rapport_Inventaire.pdf");
        }

        // Date automatique
        const mois = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
        const d = new Date();
        document.getElementById('titre-mois').innerText = "Inventaire Mensuel — " + mois[d.getMonth()] + " " + d.getFullYear();
    </script>
</body>
</html>
