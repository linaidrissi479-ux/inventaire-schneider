<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schneider Electric - Inventaire par IDRISSI Lina</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --se-green: #009639;
            --se-dark: #2A2E33;
            --bg-body: #E9EDF0;
            --shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-body); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 280px; background: white; padding: 30px; display: flex; flex-direction: column; border-right: 1px solid #E1E8ED; }
        .brand { font-size: 22px; font-weight: 800; color: var(--se-green); margin-bottom: 40px; display: flex; align-items: center; }
        .brand i { margin-right: 12px; }

        .import-zone { background: #F4F7F6; padding: 20px; border-radius: 12px; border: 2px dashed #C3CBD1; text-align: center; cursor: pointer; transition: 0.3s; }
        .import-zone:hover { border-color: var(--se-green); background: #e6f7ec; }
        .import-zone input { display: none; }
        
        .signature { margin-top: auto; padding: 15px; border-top: 1px solid #eee; font-size: 13px; color: #555; text-align: center; }
        .signature b { color: var(--se-green); font-weight: 800; }

        /* Main Content */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .dashboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 18px; border-radius: 16px; box-shadow: var(--shadow); border-top: 4px solid #eee; }
        .stat-card h3 { margin: 0; font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .value { font-size: 24px; font-weight: 800; color: var(--se-dark); margin: 8px 0; }
        
        .card-1 { border-color: #007bff; }
        .card-2 { border-color: #6c757d; }
        .card-3 { border-color: var(--se-green); }
        .card-4 { border-color: #28a745; }
        .card-5 { border-color: #dc3545; }

        /* Scan & Table */
        .scan-zone { background: white; padding: 20px; border-radius: 16px; box-shadow: var(--shadow); margin-bottom: 25px; display: flex; align-items: center; gap: 15px; }
        input[type="text"] { flex: 1; padding: 15px; border: 2px solid #E1E8ED; border-radius: 10px; font-size: 16px; font-weight: 600; }
        input[type="text"]:focus { border-color: var(--se-green); outline: none; }

        .table-container { background: white; border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #F4F7F6; padding: 15px; text-align: left; font-size: 11px; color: #777; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; }

        .badge { padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; width: 100px; text-align: center; display: inline-block; }
        .bg-ok { background: #E6F7EC; color: var(--se-green); }
        .bg-manquant { background: #FFEBEB; color: #D9534F; }
        .bg-surplus { background: #FFF9E6; color: #F0AD4E; }

        .btn-pdf { background: var(--se-green); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: 700; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand"><i class="fa-solid fa-leaf"></i> Schneider Electric</div>
        
        <label class="import-zone">
            <i class="fa-solid fa-file-csv" style="font-size: 24px; color: #888;"></i>
            <p style="font-size: 13px; margin: 10px 0 0;">Importer Base SAP</p>
            <input type="file" id="csv-file" accept=".csv" onclick="this.value=null;">
        </label>

        <button class="btn-pdf" onclick="exportPDF()"><i class="fa-solid fa-file-export"></i> EXPORTER LE RAPPORT</button>

        <div class="signature">
            réalisé par : <br><b>IDRISSI Lina</b>
        </div>
    </div>

    <div class="main-content">
        <header>
            <h1 style="margin:0; font-size: 28px;">Digital Inventory Dashboard</h1>
            <div style="background:white; padding:8px 15px; border-radius:20px; font-size:13px; font-weight:600; box-shadow: var(--shadow);">
                <i class="fa-solid fa-calendar-check"></i> <span id="current-date"></span>
            </div>
        </header>

        <div class="dashboard">
            <div class="stat-card card-1">
                <h3>Références SAP</h3>
                <div id="stat-refs-sap" class="value">0</div>
            </div>
            <div class="stat-card card-2">
                <h3>Quantité Totale SAP</h3>
                <div id="stat-qty-sap" class="value">0</div>
            </div>
            <div class="stat-card card-3">
                <h3>Articles Scannés</h3>
                <div id="stat-qty-reel" class="value">0</div>
            </div>
            <div class="stat-card card-4">
                <h3>Lignes Conformes</h3>
                <div id="stat-conf" class="value">0</div>
            </div>
            <div class="stat-card card-5">
                <h3>Lignes Non Conformes</h3>
                <div id="stat-non-conf" class="value">0</div>
            </div>
        </div>

        <div class="scan-zone">
            <i class="fa-solid fa-barcode" style="font-size: 30px; color: var(--se-green);"></i>
            <input type="text" id="barcode-input" placeholder="Scanner un produit..." disabled>
            <span id="feedback" style="font-weight: 700; font-size: 13px;"></span>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Référence</th>
                        <th>Désignation technique</th>
                        <th>Stock SAP</th>
                        <th>Comptage Réel</th>
                        <th>Statut</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        let dbStock = {}; 
        let reelCount = {}; 

        function cleanNumber(val) {
            if (!val) return 0;
            let n = parseInt(val.toString().replace(/\s/g, ''));
            return isNaN(n) ? 0 : n;
        }

        document.getElementById('csv-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            dbStock = {}; reelCount = {}; 
            document.getElementById('table-body').innerHTML = "";

            Papa.parse(file, {
                header: true, dynamicTyping: true, skipEmptyLines: true,
                complete: function(results) {
                    results.data.forEach(row => {
                        let normalizedRow = {};
                        Object.keys(row).forEach(key => normalizedRow[key.trim()] = row[key]);
                        const ref = normalizedRow["Reference"] ? normalizedRow["Reference"].toString().trim().toUpperCase() : null;
                        if (ref) {
                            dbStock[ref] = { 
                                designation: normalizedRow["Designation"] || "N/A", 
                                theo: cleanNumber(normalizedRow["StockTheorique"]) 
                            };
                        }
                    });
                    document.getElementById('barcode-input').disabled = false;
                    document.getElementById('barcode-input').placeholder = "Prêt pour scan...";
                    document.getElementById('barcode-input').focus();
                    updateUI();
                }
            });
        });

        document.getElementById('barcode-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const code = this.value.trim().toUpperCase();
                if (dbStock[code]) {
                    reelCount[code] = (reelCount[code] || 0) + 1;
                    updateUI();
                    renderTable();
                    document.getElementById('feedback').innerText = "✅ " + dbStock[code].designation;
                    document.getElementById('feedback').style.color = "var(--se-green)";
                } else if (code !== "") {
                    document.getElementById('feedback').innerText = "⚠️ RÉFÉRENCE INCONNUE";
                    document.getElementById('feedback').style.color = "red";
                }
                this.value = "";
            }
        });

        function updateUI() {
            let totalQtySAP = 0, totalQtyReel = 0, confCount = 0, nonConfCount = 0;
            Object.keys(dbStock).forEach(ref => {
                const item = dbStock[ref];
                totalQtySAP += item.theo;
                const reel = reelCount[ref] || 0;
                if (reel === item.theo) confCount++; else nonConfCount++;
            });
            Object.values(reelCount).forEach(qty => totalQtyReel += qty);
            document.getElementById('stat-refs-sap').innerText = Object.keys(dbStock).length;
            document.getElementById('stat-qty-sap').innerText = totalQtySAP;
            document.getElementById('stat-qty-reel').innerText = totalQtyReel;
            document.getElementById('stat-conf').innerText = confCount;
            document.getElementById('stat-non-conf').innerText = nonConfCount;
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = "";
            for (let ref in reelCount) {
                const item = dbStock[ref];
                const reel = reelCount[ref];
                const ecart = reel - item.theo;
                let badgeClass = 'bg-ok', statusTxt = 'CONFORME';
                if (ecart < 0) { badgeClass = 'bg-manquant'; statusTxt = 'MANQUANT'; }
                else if (ecart > 0) { badgeClass = 'bg-surplus'; statusTxt = 'SURPLUS'; }
                tbody.innerHTML += `<tr>
                    <td><b>${ref}</b></td>
                    <td>${item.designation}</td>
                    <td>${item.theo}</td>
                    <td><b>${reel}</b></td>
                    <td><span class="badge ${badgeClass}">${statusTxt} (${ecart > 0 ? '+' : ''}${ecart})</span></td>
                </tr>`;
            }
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const now = new Date();
            
            // Mois en lettres pour le nom du fichier
            const moisArr = ["janvier", "février", "mars", "avril", "mai", "juin", "juillet", "août", "septembre", "octobre", "novembre", "décembre"];
            const nomMois = moisArr[now.getMonth()];

            doc.setFillColor(0, 150, 57);
            doc.rect(0, 0, 210, 45, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22);
            doc.text("Rapport inventaire tournant", 15, 25);
            doc.setFontSize(10);
            doc.text("réalisé par : IDRISSI Lina | Schneider Electric", 15, 35);

            doc.setTextColor(40, 46, 51);
            doc.setFontSize(11);
            doc.text("SYNTHÈSE DE L'INVENTAIRE :", 15, 55);
            doc.setFontSize(9);
            const stats = [
                `Ref. SAP : ${document.getElementById('stat-refs-sap').innerText}`,
                `Qté SAP : ${document.getElementById('stat-qty-sap').innerText}`,
                `Qté Réelle : ${document.getElementById('stat-qty-reel').innerText}`,
                `Conformes : ${document.getElementById('stat-conf').innerText}`,
                `Non Conformes : ${document.getElementById('stat-non-conf').innerText}`
            ];
            doc.text(stats.join("  |  "), 15, 62);
            const data = Object.keys(reelCount).map(ref => {
                const ecart = reelCount[ref] - dbStock[ref].theo;
                const status = ecart === 0 ? "CONFORME" : (ecart < 0 ? "MANQUANT" : "SURPLUS");
                return [ref, dbStock[ref].designation, dbStock[ref].theo, reelCount[ref], status + ` (${ecart})`];
            });
            doc.autoTable({
                head: [['Référence', 'Désignation', 'Stock SAP', 'Réel Scan', 'Statut (Écart)']],
                body: data,
                startY: 70,
                headStyles: { fillColor: [0, 150, 57] }
            });
            
            // Sauvegarde avec le nom demandé
            doc.save(`inventaire ${nomMois}.pdf`);
        }
        document.getElementById('current-date').innerText = new Date().toLocaleDateString();
    </script>
</body>
</html>
