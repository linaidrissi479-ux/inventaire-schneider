<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schneider Electric - Dashboard Inventaire</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --se-green: #009639;
            --se-dark: #2A2E33;
            --bg-body: #E9EDF0;
            --shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-body); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 280px; background: white; padding: 30px; display: flex; flex-direction: column; border-right: 1px solid #E1E8ED; }
        .brand { font-size: 22px; font-weight: 800; color: var(--se-green); margin-bottom: 40px; display: flex; align-items: center; }
        .brand i { margin-right: 12px; }

        .import-zone { background: #F4F7F6; padding: 20px; border-radius: 12px; border: 2px dashed #C3CBD1; text-align: center; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .import-zone:hover { border-color: var(--se-green); background: #e6f7ec; }
        .import-zone input { display: none; }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        header h1 { margin: 0; font-size: 28px; color: var(--se-dark); font-weight: 800; margin-bottom: 10px; }
        
        .date-info { margin-bottom: 20px; font-size: 14px; font-weight: 600; color: #666; }

        .dashboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 18px; border-radius: 16px; box-shadow: var(--shadow); border-top: 4px solid #eee; }
        .stat-card h3 { margin: 0; font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .value { font-size: 24px; font-weight: 800; color: var(--se-dark); margin: 8px 0; }
        
        .card-1 { border-color: #007bff; }
        .card-2 { border-color: #6c757d; }
        .card-3 { border-color: var(--se-green); }
        .card-4 { border-color: #28a745; }
        .card-5 { border-color: #dc3545; }

        .scan-zone { background: white; padding: 20px; border-radius: 16px; box-shadow: var(--shadow); margin-bottom: 25px; display: flex; align-items: center; gap: 15px; }
        input[type="text"] { flex: 1; padding: 15px; border: 2px solid #E1E8ED; border-radius: 10px; font-size: 16px; font-weight: 600; }
        input[type="text"]:focus { border-color: var(--se-green); outline: none; }

        .table-container { background: white; border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #F4F7F6; padding: 15px; text-align: left; font-size: 11px; color: #777; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; }

        .badge { padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; width: 60px; text-align: center; display: inline-block; }
        .bg-ok { background: #E6F7EC; color: var(--se-green); }
        .bg-manquant { background: #FFEBEB; color: #D9534F; }
        .bg-surplus { background: #FFF9E6; color: #F0AD4E; }

        .btn-pdf { background: var(--se-green); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: 700; margin-top: auto; width: 100%; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand"><i class="fa-solid fa-leaf"></i> Schneider</div>
        
        <label class="import-zone">
            <i class="fa-solid fa-file-csv" style="font-size: 24px; color: #888;"></i>
            <p style="font-size: 12px; margin-top: 10px;">Importer Fichier Stock</p>
            <input type="file" id="csv-file" accept=".csv" onclick="this.value=null;">
        </label>

        <button class="btn-pdf" onclick="exportPDF()"><i class="fa-solid fa-file-export"></i> EXPORTER PDF</button>
    </div>

    <div class="main-content">
        <header>
            <h1>Digital Inventory Dashboard</h1>
            <div class="date-info">
                <i class="fa-solid fa-calendar-day"></i> Généré le : <span id="current-date"></span>
            </div>
        </header>

        <div class="dashboard">
            <div class="stat-card card-1">
                <h3>Emplacements (SAP)</h3>
                <div id="stat-refs-sap" class="value">0</div>
            </div>
            <div class="stat-card card-2">
                <h3>Total théorique (SAP)</h3>
                <div id="stat-qty-sap" class="value">0</div>
            </div>
            <div class="stat-card card-3">
                <h3>Quantité scannée</h3>
                <div id="stat-qty-reel" class="value">0</div>
            </div>
            <div class="stat-card card-4">
                <h3>Lignes conformes</h3>
                <div id="stat-conf" class="value">0</div>
            </div>
            <div class="stat-card card-5">
                <h3>Lignes écarts</h3>
                <div id="stat-non-conf" class="value">0</div>
            </div>
        </div>

        <div class="scan-zone">
            <i class="fa-solid fa-barcode" style="font-size: 30px; color: var(--se-green);"></i>
            <input type="text" id="barcode-input" placeholder="Scanner un emplacement ou un produit..." disabled>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Current location</th>
                        <th>Site code</th>
                        <th>Somme de STOCK ON HAND</th>
                        <th>Stock réel</th>
                        <th>Écart</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        let dbStock = {}; 
        let reelCount = {}; 

        function cleanNumber(val) {
            if (!val) return 0;
            let n = parseInt(val.toString().replace(/\s/g, ''));
            return isNaN(n) ? 0 : n;
        }

        document.getElementById('csv-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                header: true, dynamicTyping: true, skipEmptyLines: true,
                complete: function(results) {
                    dbStock = {}; reelCount = {};
                    results.data.forEach(row => {
                        // Nettoyage des noms de colonnes
                        let cleanRow = {};
                        Object.keys(row).forEach(key => cleanRow[key.trim()] = row[key]);

                        // On utilise 'Current location' comme identifiant unique
                        const locId = cleanRow["Current location"] ? cleanRow["Current location"].toString().trim() : null;
                        
                        if (locId) {
                            dbStock[locId] = { 
                                site: cleanRow["Site code"] || "N/A", 
                                theo: cleanNumber(cleanRow["Somme de STOCK ON HAND"]) 
                            };
                        }
                    });
                    document.getElementById('barcode-input').disabled = false;
                    document.getElementById('barcode-input').focus();
                    updateUI();
                    renderTable();
                }
            });
        });

        document.getElementById('barcode-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const code = this.value.trim();
                if (dbStock[code]) {
                    reelCount[code] = (reelCount[code] || 0) + 1;
                    updateUI();
                    renderTable();
                }
                this.value = "";
            }
        });

        function updateUI() {
            let totalTheo = 0, totalReel = 0, conf = 0, nonConf = 0;
            Object.keys(dbStock).forEach(key => {
                const item = dbStock[key];
                totalTheo += item.theo;
                const reel = reelCount[key] || 0;
                if (reel === item.theo) conf++; else nonConf++;
            });
            Object.values(reelCount).forEach(v => totalReel += v);

            document.getElementById('stat-refs-sap').innerText = Object.keys(dbStock).length;
            document.getElementById('stat-qty-sap').innerText = totalTheo;
            document.getElementById('stat-qty-reel').innerText = totalReel;
            document.getElementById('stat-conf').innerText = conf;
            document.getElementById('stat-non-conf').innerText = nonConf;
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = "";
            Object.keys(dbStock).forEach(key => {
                const item = dbStock[key];
                const reel = reelCount[key] || 0;
                const ecart = reel - item.theo;
                let badgeClass = 'bg-ok';
                if (ecart < 0) badgeClass = 'bg-manquant';
                if (ecart > 0) badgeClass = 'bg-surplus';

                // On n'affiche que ce qui a été scanné OU tout le monde ?
                // Ici, on affiche tout pour voir les écarts même sur ce qui n'est pas scanné
                tbody.innerHTML += `<tr>
                    <td><b>${key}</b></td>
                    <td>${item.site}</td>
                    <td>${item.theo}</td>
                    <td><b>${reel}</b></td>
                    <td><span class="badge ${badgeClass}">${ecart > 0 ? '+' : ''}${ecart}</span></td>
                </tr>`;
            });
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const now = new Date();
            
            doc.setFillColor(0, 150, 57);
            doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22);
            doc.text("Rapport inventaire tournant", 15, 25);
            
            doc.setTextColor(40, 46, 51);
            doc.setFontSize(10);
            doc.text(`Généré le : ${now.toLocaleDateString()} à ${now.toLocaleTimeString()}`, 15, 50);

            const data = Object.keys(dbStock).map(key => {
                const reel = reelCount[key] || 0;
                const ecart = reel - dbStock[key].theo;
                return [key, dbStock[key].site, dbStock[key].theo, reel, (ecart > 0 ? '+' : '') + ecart];
            });

            doc.autoTable({
                head: [['Current location', 'Site code', 'Somme de STOCK ON HAND', 'Stock réel', 'Écart']],
                body: data,
                startY: 60,
                headStyles: { fillColor: [0, 150, 57] }
            });
            doc.save(`inventaire_${now.toLocaleDateString()}.pdf`);
        }
        document.getElementById('current-date').innerText = new Date().toLocaleDateString();
    </script>
</body>
</html>
